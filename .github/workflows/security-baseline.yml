name: security-baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  dependency-audit-and-policy:
    name: Dependency audit + N/N-1 policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce N/N-1 direct dependency policy
        run: pnpm run security:n-1

      - name: Audit dependencies for known advisories
        run: pnpm run security:audit

  osv-scan-pr:
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3
    with:
      fail-on-vuln: true
      scan-args: |-
        -L
        pnpm-lock.yaml

  osv-scan-scheduled:
    if: github.event_name != 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3
    with:
      fail-on-vuln: true
      scan-args: |-
        -L
        pnpm-lock.yaml
